<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Properties in CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- There are majorly 4 most used list-style properties in CSS
    1. List-style-type: 
    2. List-style-position: 
    3. List-style-image: 
    4. List-style-property:-->

    <div class="list">
        <ul class="style">
            <li>Ahmed Raza</li>
            <li>Syeda Hooria</li>
            <li>Mudasir Junaid</li>
            <li>Sufiyan Junaid</li>
            <li>Ayan Junaid</li>
            <li>Junaid Haroon</li>
        </ul>
    </div>

</body>

</html>
