<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lazy Loading Example..</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <h1>Lazy Loading Images with Intersection Observer</h1>

    <div class="container">
        <p>Scroll down to see Images load only when they enter the viewport</p>
        <div class="spacer"></div>

        <img data-src="https://images.unsplash.com/photo-1773332611612-ffdaa753afb1?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxfHx8ZW58MHx8fHx8" class="lazy-img" alt="img-1">

        <div class="spacer"></div>

        <img data-src="https://images.unsplash.com/photo-1778165657501-558e29e5e0c0?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxOXx8fGVufDB8fHx8fA%3D%3D" class="lazy-img" alt="img-2">

        <div class="spacer"></div>
        <img data-src="https://images.unsplash.com/photo-1773332611574-d73d8f5cea36?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw0Mnx8fGVufDB8fHx8fA%3D%3D" class="lazy-img" alt="img-3">

        <div class="spacer"></div>
        <img data-src="https://images.unsplash.com/photo-1778754607099-e42d3664ced6?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw1Mnx8fGVufDB8fHx8fA%3D%3D" class="lazy-img" alt="img-4">
    </div>

    <script src="script.js"></script>
  </body>
</html>
